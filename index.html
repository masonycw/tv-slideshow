<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輪播展示</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none;
      font-family:'Noto Sans TC', system-ui, -apple-system, sans-serif; }

    /* ── Channel select screen ── */
    #ch-select {
      display:none; position:absolute; inset:0; flex-direction:column;
      align-items:center; justify-content:center; gap:32px; z-index:20;
    }
    #ch-select.show { display:flex; }
    #ch-select h1   { color:rgba(255,255,255,.6); font-size:28px; font-weight:300; letter-spacing:.1em; }
    #ch-list        { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; max-width:800px; }
    .ch-card {
      display:block; padding:20px 36px; background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.2); border-radius:12px; color:#fff;
      font-size:22px; font-weight:300; text-decoration:none; letter-spacing:.05em;
      transition:background .2s, border-color .2s;
    }
    .ch-card:hover { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.5); }
    .ch-hint { color:rgba(255,255,255,.35); font-size:16px; }

    /* ── Slideshow stage ── */
    #stage { position:relative; width:100%; height:100%; overflow:hidden; }

    .slot {
      position:absolute; inset:0; opacity:0; z-index:0;
      overflow:hidden; will-change:opacity, transform;
    }
    .slot-img {
      position:absolute; inset:0;
      background-size:cover; background-position:center; background-repeat:no-repeat;
    }
    .slot-vid {
      position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    }


    /* Caption */
    #caption {
      position:absolute; bottom:0; left:0; right:0; z-index:10;
      padding:80px 60px 40px;
      background:linear-gradient(transparent, rgba(0,0,0,.75));
      color:#fff; font-size:clamp(18px,2.4vw,44px); font-weight:300;
      letter-spacing:.05em; line-height:1.5;
      opacity:0; transition:opacity .6s ease; pointer-events:none;
    }
    #caption.show { opacity:1; }


    /* Empty */
    #empty { display:none; position:absolute; inset:0; flex-direction:column; align-items:center;
      justify-content:center; gap:12px; color:rgba(255,255,255,.35); z-index:5; }
    #empty.show { display:flex; }
    #empty p     { font-size:28px; font-weight:300; }
    #empty small { font-size:15px; opacity:.55; }
  </style>
</head>
<body>

<!-- Channel selector (shown when no ?ch= param) -->
<div id="ch-select">
  <h1>選擇頻道</h1>
  <div id="ch-list"></div>
</div>

<!-- Slideshow stage -->
<div id="stage" style="display:none">
  <div class="slot" id="slot-a"></div>
  <div class="slot" id="slot-b"></div>
  <div id="caption"></div>
  <div id="empty">
    <p>此頻道尚無內容</p>
    <small>請前往管理頁面上傳照片或影片</small>
  </div>
</div>

<script>
const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TRANS_MS = 900;

let channel = null; // { id, slug, interval_ms, sync_enabled }
let items   = [];
let curIdx  = 0;
let activeSlot = 'a';
let freeTimer  = null;
let syncTimer  = null;
let syncRaf    = null;
let lastSlot   = -1;

const slotA   = document.getElementById('slot-a');
const slotB   = document.getElementById('slot-b');
const capEl   = document.getElementById('caption');
const emptyEl = document.getElementById('empty');

const slot  = (n) => n === 'a' ? slotA : slotB;
const other = (n) => n === 'a' ? 'b' : 'a';
const pick  = (arr) => arr[Math.floor(Math.random() * arr.length)];

/* ── Preload ── */
function preload(item) {
  if (item.file_type === 'video') return Promise.resolve();
  return new Promise(r => { const i = new Image(); i.onload = i.onerror = r; i.src = item.public_url; });
}

/* ── Timer stop ── */
function stopProgress() {
  clearInterval(freeTimer);
  if (syncRaf) { cancelAnimationFrame(syncRaf); syncRaf = null; }
}

/* ── Slot render ── */
function buildImageSlot(el, item) {
  const div = document.createElement('div');
  div.className = 'slot-img';
  div.style.backgroundImage = `url("${item.public_url}")`;
  el.innerHTML = '';
  el.appendChild(div);
}

function buildVideoSlot(el, item, onEnded) {
  const vid = document.createElement('video');
  vid.className = 'slot-vid';
  vid.src = item.public_url;
  vid.autoplay = true;
  vid.muted = true;
  vid.playsInline = true;
  vid.loop = false;
  vid.addEventListener('ended', onEnded);
  el.innerHTML = '';
  el.appendChild(vid);
  vid.play().catch(() => {});
}

/* ── Transition ── */
async function showSlide(idx, effect) {
  if (items.length === 0) return;
  const item  = items[idx];
  const nName = other(activeSlot);
  const cur   = slot(activeSlot);
  const nxt   = slot(nName);

  await preload(item);

  // Setup next slot content
  nxt.style.cssText = '';
  nxt.className = 'slot';
  nxt.style.zIndex = '2';

  if (item.file_type === 'video') {
    buildVideoSlot(nxt, item, () => advance());
  } else {
    buildImageSlot(nxt, item);
  }

  // Caption
  if (item.caption && item.caption.trim()) {
    capEl.textContent = item.caption;
    capEl.classList.add('show');
  } else {
    capEl.classList.remove('show');
  }

  // Apply transition
  if (effect === 'fade') {
    nxt.style.opacity = '0';
    nxt.style.transition = `opacity ${TRANS_MS}ms ease-in-out`;
    void nxt.offsetWidth;
    nxt.style.opacity = '1';
    cur.style.transition = `opacity ${TRANS_MS}ms ease-in-out`;
    cur.style.opacity = '0';

  } else if (effect === 'slide-left') {
    nxt.style.transform = 'translateX(100%)';
    nxt.style.opacity = '1';
    nxt.style.transition = `transform ${TRANS_MS}ms cubic-bezier(.4,0,.2,1)`;
    void nxt.offsetWidth;
    nxt.style.transform = 'translateX(0)';
    cur.style.transition = `transform ${TRANS_MS}ms cubic-bezier(.4,0,.2,1), opacity ${TRANS_MS}ms ease`;
    cur.style.transform = 'translateX(-20%)';
    cur.style.opacity = '0';

  } else if (effect === 'slide-up') {
    nxt.style.transform = 'translateY(100%)';
    nxt.style.opacity = '1';
    nxt.style.transition = `transform ${TRANS_MS}ms cubic-bezier(.4,0,.2,1)`;
    void nxt.offsetWidth;
    nxt.style.transform = 'translateY(0)';
    cur.style.transition = `transform ${TRANS_MS}ms cubic-bezier(.4,0,.2,1), opacity ${TRANS_MS}ms ease`;
    cur.style.transform = 'translateY(-20%)';
    cur.style.opacity = '0';

  } else { // zoom
    nxt.style.transform = 'scale(1.12)';
    nxt.style.opacity = '0';
    nxt.style.transition = `opacity ${TRANS_MS}ms ease-in-out, transform ${TRANS_MS}ms ease-out`;
    void nxt.offsetWidth;
    nxt.style.opacity = '1';
    nxt.style.transform = 'scale(1)';
    cur.style.transition = `opacity ${TRANS_MS}ms ease-in-out`;
    cur.style.opacity = '0';
  }

  cur.style.zIndex = '1';
  activeSlot = nName;
  curIdx = idx;

  setTimeout(() => {
    cur.style.cssText = '';
    cur.className = 'slot';
    cur.innerHTML = '';
  }, TRANS_MS + 100);
}

/* ── Advance ── */
async function advance(forceIdx) {
  if (items.length === 0) return;
  stopProgress();

  let idx;
  if (channel.sync_enabled && items[curIdx].file_type !== 'video') {
    // After video, jump to correct sync slot
    idx = Math.floor(Date.now() / channel.interval_ms) % items.length;
  } else if (typeof forceIdx === 'number') {
    idx = forceIdx;
  } else {
    idx = (curIdx + 1) % items.length;
  }

  const effect = 'fade';

  await showSlide(idx, effect);
}

/* ── Sync timer ── */
function startSyncLoop() {
  if (syncTimer) clearInterval(syncTimer);
  lastSlot = Math.floor(Date.now() / channel.interval_ms);
  syncTimer = setInterval(() => {
    if (items.length === 0) return;
    if (items[curIdx]?.file_type === 'video') return;  // let video finish
    const s = Math.floor(Date.now() / channel.interval_ms);
    if (s !== lastSlot) {
      lastSlot = s;
      const idx = s % items.length;
      if (idx !== curIdx) advance(idx);
    }
  }, 250);
}

/* ── Free timer ── */
function startFreeTimer() {
  if (freeTimer) clearInterval(freeTimer);
  freeTimer = setInterval(() => {
    if (items[curIdx]?.file_type !== 'video') advance();
  }, channel.interval_ms);
}

/* ── Start slideshow ── */
async function startSlideshow() {
  if (items.length === 0) { emptyEl.classList.add('show'); return; }
  emptyEl.classList.remove('show');

  let idx = 0;
  if (channel.sync_enabled) {
    idx = Math.floor(Date.now() / channel.interval_ms) % items.length;
  }

  stopProgress();
  await showSlide(idx, 'fade');

  if (channel.sync_enabled) startSyncLoop();
  else startFreeTimer();

  // Preload next
  if (items.length > 1 && items[(idx+1) % items.length].file_type === 'image') {
    preload(items[(idx+1) % items.length]);
  }
}

/* ── Fetch ── */
async function fetchItems(channelId) {
  const { data } = await db
    .from('slideshow_items')
    .select('id, public_url, file_type, caption')
    .eq('channel_id', channelId)
    .eq('active', true)
    .order('display_order');
  return data || [];
}

async function fetchChannel(slug) {
  const { data } = await db
    .from('slideshow_channels')
    .select('id, name, slug, interval_ms, sync_enabled, force_refresh_at')
    .eq('slug', slug)
    .single();
  return data;
}

/* ── Channel select screen ── */
async function showChannelSelect() {
  const { data: channels } = await db
    .from('slideshow_channels')
    .select('name, slug')
    .order('created_at');

  document.getElementById('ch-select').classList.add('show');
  const listEl = document.getElementById('ch-list');

  if (!channels || channels.length === 0) {
    listEl.innerHTML = '<p class="ch-hint">尚無頻道，請前往管理頁面建立</p>';
    return;
  }
  channels.forEach(ch => {
    const a = document.createElement('a');
    a.className = 'ch-card';
    a.href = `?ch=${ch.slug}`;
    a.textContent = ch.name;
    listEl.appendChild(a);
  });
}

/* ── Init ── */
async function init() {
  const slug = new URLSearchParams(location.search).get('ch');
  if (!slug) { await showChannelSelect(); return; }

  channel = await fetchChannel(slug);
  if (!channel) {
    document.getElementById('ch-select').classList.add('show');
    document.getElementById('ch-list').innerHTML =
      `<p class="ch-hint">找不到頻道「${slug}」</p>`;
    return;
  }

  document.title = channel.name + ' — 輪播展示';
  document.getElementById('stage').style.display = '';

  items = await fetchItems(channel.id);
  await startSlideshow();

  // 每 10 秒檢查是否有強制重新整理指令
  let knownRefreshAt = channel.force_refresh_at ?? null;
  setInterval(async () => {
    const { data } = await db
      .from('slideshow_channels')
      .select('force_refresh_at')
      .eq('id', channel.id)
      .single();
    if (data?.force_refresh_at && data.force_refresh_at !== knownRefreshAt) {
      location.reload();
    }
  }, 10000);

  // Periodic refresh
  setInterval(async () => {
    const prev = items.length;
    items = await fetchItems(channel.id);
    if (prev === 0 && items.length > 0) startSlideshow();
  }, REFRESH_INTERVAL);
}

init();
</script>
</body>
</html>
